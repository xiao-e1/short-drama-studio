<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>短剧智能工坊</title>
<style>
:root {
  --bg-primary: #0a0a0a;
  --bg-secondary: #1a1a1a;
  --bg-tertiary: #252525;
  --bg-hover: #2a2a2a;
  --text-primary: #e0e0e0;
  --text-secondary: #a0a0a0;
  --text-muted: #666;
  --accent: #c9a96e;
  --accent-hover: #d4b87a;
  --accent-dim: rgba(201, 169, 110, 0.15);
  --danger: #e05555;
  --danger-bg: rgba(224, 85, 85, 0.12);
  --success: #4caf84;
  --success-bg: rgba(76, 175, 132, 0.12);
  --info: #5b9bd5;
  --border: #333;
  --border-light: #2a2a2a;
  --radius: 8px;
  --radius-sm: 6px;
  --radius-lg: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
  --sidebar-width: 280px;
  --transition: 0.2s ease;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  overflow: hidden;
  line-height: 1.6;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #555; }

.sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 20px 16px;
  gap: 16px;
  overflow-y: auto;
}
.sidebar-logo { font-size: 20px; font-weight: 700; color: var(--accent); text-align: center; padding: 8px 0; letter-spacing: 1px; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 18px; border: none; border-radius: var(--radius-sm); cursor: pointer;
  font-size: 14px; font-weight: 500; transition: all var(--transition); outline: none; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #1a1a1a; font-weight: 600; }
.btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg-hover); border-color: #555; }
.btn-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid transparent; }
.btn-danger:hover { background: rgba(224,85,85,0.25); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 4px; }
.btn-full { width: 100%; }

.project-list { flex: 1; overflow-y: auto; }
.project-list-title { font-size: 12px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 8px; padding-left: 4px; }
.project-item {
  padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; transition: all var(--transition); margin-bottom: 4px; border: 1px solid transparent;
}
.project-item:hover { background: var(--bg-hover); }
.project-item.active { background: var(--accent-dim); border-color: var(--accent); }
.project-item-name { font-weight: 500; font-size: 14px; }
.project-item-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.project-item-actions { display: flex; gap: 4px; margin-top: 6px; }

.settings-section { border-top: 1px solid var(--border); padding-top: 16px; }
.settings-title { font-size: 12px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 10px; }
.form-group { margin-bottom: 10px; }
.form-label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.form-input {
  width: 100%; padding: 8px 10px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary);
  font-size: 13px; outline: none; transition: border var(--transition);
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text-muted); }

.main-area { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.top-bar {
  display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); gap: 16px;
}
.project-name-input {
  background: transparent; border: 1px solid transparent; color: var(--text-primary); font-size: 18px; font-weight: 600; padding: 4px 8px;
  border-radius: var(--radius-sm); outline: none; width: 300px; transition: border var(--transition);
}
.project-name-input:hover { border-color: var(--border); }
.project-name-input:focus { border-color: var(--accent); background: var(--bg-tertiary); }
.orientation-toggle { display: flex; background: var(--bg-tertiary); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
.orientation-btn { padding: 6px 14px; cursor: pointer; font-size: 13px; border: none; background: transparent; color: var(--text-secondary); transition: all var(--transition); }
.orientation-btn.active { background: var(--accent); color: #1a1a1a; font-weight: 600; }
.orientation-btn:not(.active):hover { color: var(--text-primary); }

.content-area { flex: 1; display: flex; overflow: hidden; }
.content-main { flex: 1; overflow-y: auto; padding: 24px; max-width: 900px; }

.step-bar { display: flex; align-items: center; gap: 0; margin-bottom: 28px; padding: 0 8px; }
.step-item { display: flex; align-items: center; gap: 8px; cursor: pointer; transition: all var(--transition); flex-shrink: 0; }
.step-circle {
  width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600;
  transition: all var(--transition); flex-shrink: 0;
}
.step-circle.done { background: var(--accent); color: #1a1a1a; }
.step-circle.active { background: var(--accent-dim); color: var(--accent); border: 2px solid var(--accent); }
.step-circle.pending { background: var(--bg-tertiary); color: var(--text-muted); }
.step-label { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
.step-label.done { color: var(--accent); }
.step-label.active { color: var(--accent); font-weight: 600; }
.step-connector { flex: 1; height: 2px; min-width: 24px; background: var(--border); margin: 0 8px; transition: background var(--transition); }
.step-connector.done { background: var(--accent); }

.card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
.card-title { font-size: 16px; font-weight: 600; color: var(--accent); }
.card-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.textarea {
  width: 100%; min-height: 160px; padding: 14px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text-primary); font-size: 14px; line-height: 1.7; resize: vertical; outline: none; font-family: inherit;
}
.textarea:focus { border-color: var(--accent); }

.input-row { display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 12px; }
.input-group { display: flex; flex-direction: column; gap: 4px; }
.input-group label { font-size: 12px; color: var(--text-secondary); }
.input-group input {
  padding: 8px 12px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary);
  font-size: 14px; width: 80px; outline: none;
}
.input-group input:focus { border-color: var(--accent); }
.info-badge { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; background: var(--accent-dim); border-radius: var(--radius-sm); font-size: 13px; color: var(--accent); }

.plot-content { line-height: 1.8; white-space: pre-wrap; }
.plot-content h3 { color: var(--accent); margin: 14px 0 6px; font-size: 16px; }
.plot-content h4 { color: var(--text-primary); margin: 10px 0 4px; font-size: 14px; }
.plot-content .scene { padding-left: 12px; border-left: 2px solid var(--accent-dim); margin: 6px 0; }
.plot-content .dialogue { color: var(--info); font-style: italic; }

.image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.image-card {
  background: var(--bg-tertiary); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border);
  position: relative; min-height: 180px; display: flex; align-items: center; justify-content: center;
}
.image-card::before {
  content: '🖼️'; font-size: 36px; opacity: 0.25; position: absolute;
}
.image-card img { width: 100%; display: block; position: relative; z-index: 1; }
.image-card img.loaded { z-index: 2; }
.image-card img.loaded + .img-label,
.image-card img[src]:not([src=""]) + .img-label { z-index: 2; }
.image-card .img-placeholder {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); font-size: 13px; flex-direction: column; gap: 8px;
}
.image-card .img-label {
  padding: 8px 10px; font-size: 12px; color: var(--text-secondary);
  position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); z-index: 2;
}

.video-panel {
  width: 0; overflow: hidden; background: var(--bg-secondary); border-left: 1px solid var(--border); transition: width 0.3s ease; display: flex; flex-direction: column;
}
.video-panel.open { width: 380px; min-width: 380px; }
.video-panel-header { padding: 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 15px; color: var(--accent); display: flex; align-items: center; justify-content: space-between; }
.video-panel-body { flex: 1; overflow-y: auto; padding: 12px; }

.fragment-episode { padding: 8px 0; border-bottom: 1px solid var(--border-light); }
.fragment-episode-title { font-weight: 600; color: var(--accent); margin-bottom: 4px; cursor: pointer; }
.fragment-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px 6px 20px; border-radius: var(--radius-sm); transition: background var(--transition); flex-wrap: wrap; }
.fragment-item:hover { background: var(--bg-hover); }
.fragment-index { color: var(--text-muted); font-size: 11px; min-width: 40px; }
.fragment-summary { flex: 1; font-size: 12px; color: var(--text-secondary); min-width: 100px; }
.fragment-status { font-size: 11px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.fragment-status.idle { background: var(--bg-tertiary); color: var(--text-muted); }
.fragment-status.generating { background: rgba(91,155,213,0.2); color: var(--info); }
.fragment-status.done { background: var(--success-bg); color: var(--success); }
.fragment-status.error { background: var(--danger-bg); color: var(--danger); }
.fragment-actions { display: flex; gap: 4px; }

.progress-bar { width: 100%; height: 4px; background: var(--bg-tertiary); border-radius: 2px; overflow: hidden; margin-top: 4px; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; }

.video-player-modal {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 1000;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
}
.video-player-modal video { max-width: 90vw; max-height: 80vh; border-radius: var(--radius-lg); background: #000; }
.video-player-modal .close-btn { color: #fff; background: rgba(255,255,255,0.15); border: none; padding: 8px 24px; border-radius: var(--radius); cursor: pointer; font-size: 14px; }

.loading-pulse { display: inline-flex; align-items: center; gap: 8px; color: var(--accent); font-size: 14px; }
.loading-pulse::after { content: ''; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }

.error-box { background: var(--danger-bg); border: 1px solid var(--danger); color: var(--danger); padding: 12px 16px; border-radius: var(--radius); margin: 12px 0; font-size: 13px; }
.empty-state { text-align: center; color: var(--text-muted); padding: 60px 20px; font-size: 14px; }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

@media (min-width: 1440px) { .content-main { max-width: 1000px; } }
@media (max-width: 1200px) { .video-panel.open { width: 320px; min-width: 320px; } }

@keyframes toastIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes toastOut { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(20px); } }
@keyframes progressPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">🎬 短剧智能工坊</div>
  <button class="btn btn-primary btn-full" onclick="createNewProject()">✨ 新建项目</button>
  <div class="project-list" id="projectList">
    <div class="project-list-title">📁 我的项目</div>
    <div id="projectListItems"></div>
  </div>
  <div class="settings-section">
    <div class="settings-title">⚙️ 设置</div>
    <div class="form-group">
      <label class="form-label">Agnes API Key</label>
      <input type="password" class="form-input" id="apiKeyInput" placeholder="输入你的 API Key">
    </div>
    <button class="btn btn-secondary btn-sm btn-full" onclick="saveApiKey()">💾 保存 API Key</button>
    <div style="margin-top:6px;font-size:11px;color:var(--text-muted);" id="apiKeyStatus"></div>
  </div>
</aside>

<div class="main-area">
  <div class="top-bar">
    <input type="text" class="project-name-input" id="projectNameInput" value="未命名项目" onchange="onProjectNameChange()" placeholder="输入项目名称">
    <div class="orientation-toggle" id="orientationToggle">
      <button class="orientation-btn active" data-orient="portrait" onclick="setOrientation('portrait')">📱 竖屏 9:16</button>
      <button class="orientation-btn" data-orient="landscape" onclick="setOrientation('landscape')">🖥️ 横屏 16:9</button>
    </div>
  </div>

  <div class="content-area">
    <div class="content-main" id="contentMain">
      <div class="step-bar" id="stepBar"></div>
      <div id="dynamicContent"></div>
    </div>
    <div class="video-panel" id="videoPanel">
      <div class="video-panel-header">📋 片段管理 <button class="btn btn-xs btn-secondary" onclick="toggleVideoPanel()">✕</button></div>
      <div class="video-panel-body" id="videoPanelBody"></div>
    </div>
  </div>
</div>

<div id="videoModal" style="display:none;"></div>

<script>
const STATE = {
  projects: {},
  currentProjectId: null,
  currentStep: 'idea',
  orientation: 'portrait',
  videoPanelOpen: false,
  activeAbortController: null
};

const STEPS = [
  { key: 'idea',      label: '💡 说想法' },
  { key: 'plot',      label: '📖 剧情' },
  { key: 'script',    label: '📝 脚本' },
  { key: 'keyframes', label: '🖼️ 关键帧' },
  { key: 'video',     label: '🎬 视频' }
];

// ----- 工具函数 -----
function getApiKey() { return localStorage.getItem('agnes_api_key') || ''; }

function saveState() {
  localStorage.setItem('drama_workshop_projects', JSON.stringify(STATE.projects));
  localStorage.setItem('drama_workshop_currentId', STATE.currentProjectId || '');
}

function loadState() {
  try {
    STATE.projects = JSON.parse(localStorage.getItem('drama_workshop_projects') || '{}');
    STATE.currentProjectId = localStorage.getItem('drama_workshop_currentId') || null;
  } catch (e) { STATE.projects = {}; STATE.currentProjectId = null; }
}

function getCurrentProject() {
  return STATE.projects[STATE.currentProjectId] || null;
}

function getStepData(key) {
  const p = getCurrentProject();
  return p?.steps?.[key] || null;
}

function setStepData(key, data) {
  const p = getCurrentProject();
  if (!p) return;
  if (!p.steps) p.steps = {};
  p.steps[key] = data;
  p.updatedAt = Date.now();
  saveState();
}

function genId() { return 'proj_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ----- 带重试的 API 调用 -----
async function apiFetch(url, options = {}, retries = 2) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('请先在左侧设置 API Key');
  const headers = {
    'Authorization': `Bearer ${apiKey}`,
    'Content-Type': 'application/json',
    ...(options.headers || {})
  };
  let lastError;
  for (let i = 0; i <= retries; i++) {
    try {
      const resp = await fetch(url, { ...options, headers });
      if (resp.status === 429) {
        const retryAfter = resp.headers.get('Retry-After') || 2;
        await new Promise(r => setTimeout(r, Number(retryAfter) * 1000 + 500));
        continue;
      }
      if (!resp.ok) {
        const text = await resp.text();
        throw new Error(`请求失败 (${resp.status}): ${text}`);
      }
      return await resp.json();
    } catch (err) {
      lastError = err;
      if (i < retries) await new Promise(r => setTimeout(r, 1500 * (i + 1)));
    }
  }
  throw lastError;
}

async function generateText(systemPrompt, userContent) {
  const body = {
    model: 'agnes-2.0-flash',
    messages: [
      { role: 'system', content: systemPrompt },
      { role: 'user', content: userContent }
    ],
    temperature: 0.8,
    max_tokens: 4096
  };
  const data = await apiFetch('https://apihub.agnes-ai.com/v1/chat/completions', { method: 'POST', body: JSON.stringify(body) });
  return data?.choices?.[0]?.message?.content || '';
}

async function generateImage(prompt, ratio = '9:16') {
  const body = {
    model: 'agnes-image-2.1-flash',
    prompt: prompt,
    size: '1K',
    ratio: ratio
  };
  const data = await apiFetch('https://apihub.agnes-ai.com/v1/images/generations', { method: 'POST', body: JSON.stringify(body) }, 1);
  const url = data?.data?.[0]?.url;
  if (!url) throw new Error('图片生成未返回有效URL');
  return url;
}

async function createVideoTask(prompt, imageUrl, width, height) {
  const body = {
    model: 'agnes-video-v2.0',
    prompt: prompt,
    image: imageUrl,
    width: width,
    height: height,
    num_frames: 121,
    frame_rate: 24
  };
  const data = await apiFetch('https://apihub.agnes-ai.com/v1/videos', { method: 'POST', body: JSON.stringify(body) });
  return data?.video_id || data?.id || '';
}

async function queryVideoTask(videoId, signal) {
  const resp = await fetch(`https://apihub.agnes-ai.com/agnesapi?video_id=${encodeURIComponent(videoId)}`, {
    headers: { 'Authorization': `Bearer ${getApiKey()}` },
    signal
  });
  if (!resp.ok) throw new Error(`查询视频失败 (${resp.status})`);
  const data = await resp.json();
  return { status: data?.status || 'processing', video_url: data?.video_url || '' };
}

async function pollVideo(videoId, onProgress, interval = 5000, signal) {
  return new Promise((resolve, reject) => {
    const check = async () => {
      if (signal?.aborted) return reject(new Error('已取消'));
      try {
        const result = await queryVideoTask(videoId, signal);
        onProgress(result);
        if (result.status === 'completed') return resolve(result.video_url);
        if (result.status === 'failed' || result.status === 'error') return reject(new Error('视频生成失败'));
        setTimeout(check, interval);
      } catch (e) { reject(e); }
    };
    check();
  });
}

// ----- UI 初始化 -----
function init() {
  loadState();
  document.getElementById('apiKeyInput').value = getApiKey();
  updateApiKeyStatus();
  if (Object.keys(STATE.projects).length === 0) createNewProject(true);
  else {
    if (!(STATE.currentProjectId && STATE.projects[STATE.currentProjectId]))
      STATE.currentProjectId = Object.keys(STATE.projects)[0];
    const proj = getCurrentProject();
    if (proj) STATE.orientation = proj.orientation || 'portrait';
  }
  renderAll();
}

function createNewProject(silent = false) {
  abortPendingVideoTasks();
  const id = genId();
  STATE.projects[id] = {
    id, name: '未命名项目', orientation: 'portrait', createdAt: Date.now(), updatedAt: Date.now(),
    steps: {}, episodes: []
  };
  STATE.currentProjectId = id;
  STATE.orientation = 'portrait';
  STATE.currentStep = 'idea';
  STATE.videoPanelOpen = false;
  saveState();
  if (!silent) renderAll();
}

function deleteProject(id) {
  if (!confirm('确定删除？')) return;
  if (STATE.currentProjectId === id) abortPendingVideoTasks();
  delete STATE.projects[id];
  STATE.currentProjectId = Object.keys(STATE.projects)[0] || null;
  saveState();
  if (!STATE.currentProjectId) createNewProject(true);
  renderAll();
}

function loadProject(id) {
  if (STATE.currentProjectId === id) return;
  abortPendingVideoTasks();
  STATE.currentProjectId = id;
  const p = getCurrentProject();
  if (p) {
    STATE.orientation = p.orientation || 'portrait';
    if (p.steps?.video) STATE.currentStep = 'video';
    else if (p.steps?.keyframes) STATE.currentStep = 'keyframes';
    else if (p.steps?.script) STATE.currentStep = 'script';
    else if (p.steps?.plot) STATE.currentStep = 'plot';
    else STATE.currentStep = 'idea';
    STATE.videoPanelOpen = (STATE.currentStep === 'video');
  }
  saveState();
  renderAll();
}

function abortPendingVideoTasks() {
  if (STATE.activeAbortController) {
    STATE.activeAbortController.abort();
    STATE.activeAbortController = null;
  }
}

function setOrientation(o) {
  STATE.orientation = o;
  const p = getCurrentProject();
  if (p) { p.orientation = o; saveState(); }
  document.querySelectorAll('#orientationToggle .orientation-btn').forEach(b => b.classList.toggle('active', b.dataset.orient === o));
}

function onProjectNameChange() {
  const p = getCurrentProject();
  if (p) { p.name = document.getElementById('projectNameInput').value || '未命名项目'; saveState(); renderProjectList(); }
}

function saveApiKey() {
  localStorage.setItem('agnes_api_key', document.getElementById('apiKeyInput').value.trim());
  updateApiKeyStatus();
  showToast('API Key 已保存 ✅');
}

function updateApiKeyStatus() {
  const el = document.getElementById('apiKeyStatus');
  if (getApiKey()) { el.textContent = '✅ API Key 已配置'; el.style.color = 'var(--success)'; }
  else { el.textContent = '⚠️ 未配置 API Key'; el.style.color = 'var(--danger)'; }

function showToast(msg) {
  const old = document.querySelector('.toast-msg');
  if (old) old.remove();
  const el = document.createElement('div');
  el.className = 'toast-msg';
  el.style.cssText = 'position:fixed;bottom:24px;right:24px;background:var(--accent);color:#1a1a1a;padding:10px 20px;border-radius:8px;font-weight:600;z-index:9999;animation:toastIn .3s ease,toastOut .3s ease 2s forwards;';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

function renderProjectList() {
  const items = Object.values(STATE.projects).sort((a,b) => b.updatedAt - a.updatedAt);
  const html = items.map(p => `
    <div class="project-item ${p.id === STATE.currentProjectId ? 'active' : ''}" onclick="loadProject('${p.id}')">
      <div class="project-item-name">${esc(p.name)}</div>
      <div class="project-item-meta">${p.episodes?.length ? '📺 '+p.episodes.length+' 集' : '📝 新项目'} · ${new Date(p.updatedAt).toLocaleDateString()}</div>
      <div class="project-item-actions"><button class="btn btn-xs btn-danger" onclick="event.stopPropagation();deleteProject('${p.id}')">🗑️</button></div>
    </div>
  `).join('');
  document.getElementById('projectListItems').innerHTML = items.length ? html : '<div class="empty-state" style="padding:20px;font-size:13px;">暂无项目</div>';
}

function renderAll() {
  renderProjectList();
  document.getElementById('projectNameInput').value = getCurrentProject()?.name || '';
  renderStepBar();
  renderContent();
  renderVideoPanel();
}

function renderStepBar() {
  const currentIdx = STEPS.findIndex(s => s.key === STATE.currentStep);
  const proj = getCurrentProject();
  const html = STEPS.map((s, i) => {
    const hasData = proj?.steps?.[s.key] != null;
    let status = 'pending';
    // 已完成：当前位置之前且有数据，或有数据且在当前位置之后（允许直接跳转）
    if (hasData && i <= currentIdx) status = 'done';
    else if (hasData && i > currentIdx) status = 'done'; // 有数据的后续步骤也标记为可点击
    else if (i === currentIdx) status = 'active';

    return `<div class="step-item" onclick="navigateToStep('${s.key}')" style="cursor:pointer">
      <div class="step-circle ${status}">${status==='done'?'✓':s.label.split(' ')[0]}</div>
      <span class="step-label ${status}">${s.label}</span>
    </div>${i < STEPS.length-1 ? `<div class="step-connector ${status==='done'?'done':''}"></div>` : ''}`;
  }).join('');
  document.getElementById('stepBar').innerHTML = html;
}

function navigateToStep(key) {
  const proj = getCurrentProject();
  if (!proj) return;
  const targetIdx = STEPS.findIndex(s => s.key === key);
  const currentIdx = STEPS.findIndex(s => s.key === STATE.currentStep);
  // 允许跳转：目标步骤已有数据，或目标步骤在当前位置之前（回退），或是紧邻的下一步
  const hasData = proj?.steps?.[key] != null;
  const isGoingBack = targetIdx <= currentIdx;
  const isNextStep = targetIdx === currentIdx + 1;
  if (hasData || isGoingBack || isNextStep) {
    STATE.currentStep = key;
    if (key === 'video') STATE.videoPanelOpen = true;
    else if (STATE.videoPanelOpen && key !== 'video') STATE.videoPanelOpen = false;
    renderAll();
  }
}

function renderContent() {
  const container = document.getElementById('dynamicContent');
  const proj = getCurrentProject();
  if (!proj) { container.innerHTML = '<div class="empty-state">🎬 请创建项目</div>'; return; }
  switch (STATE.currentStep) {
    case 'idea': renderIdeaStep(container); break;
    case 'plot': renderPlotStep(container); break;
    case 'script': renderScriptStep(container); break;
    case 'keyframes': renderKeyframesStep(container); break;
    case 'video': renderVideoStep(container); break;
  }
}

// ========== 关键帧步骤（修复图片加载慢的问题） ==========
function renderKeyframesStep(container) {
  const kf = getStepData('keyframes');
  const script = getStepData('script');
  if (!script) { container.innerHTML = '<div class="empty-state">🖼️ 请先生成脚本</div>'; return; }
  if (!kf) {
    const scenes = parseScenes(script);
    container.innerHTML = `<div class="card"><div class="card-header"><span class="card-title">🖼️ 关键帧</span></div>
      <p>检测到 ${scenes.length} 个场景，模式：${STATE.orientation==='portrait'?'竖屏':'横屏'}</p>
      <button class="btn btn-primary" onclick="generateAllKeyframes()">生成 ${scenes.length} 张关键帧</button>
      <div id="keyframeProgress" style="margin-top:12px"></div></div>`;
    return;
  }
  const imgs = Array.isArray(kf) ? kf : [];
  container.innerHTML = `<div class="card">
    <div class="card-header"><span class="card-title">🖼️ 关键帧 (${imgs.length}张)</span>
      <div class="card-actions"><button class="btn btn-secondary btn-sm" onclick="redoStep('keyframes')">🔄 重做</button>
      <button class="btn btn-primary btn-sm" onclick="approveStep('video')">➕ 生成视频</button></div>
    </div>
    <div class="image-grid">
      ${imgs.map((img, idx) => `
        <div class="image-card" id="imgCard${idx}">
          <div class="img-placeholder" id="imgPlaceholder${idx}">
            <span>🖼️</span>
            <span style="font-size:11px;">加载中…</span>
          </div>
          <img src="${esc(img.url || '')}"
               loading="lazy"
               alt="${esc(img.sceneLabel || '关键帧')}"
               onload="document.getElementById('imgPlaceholder${idx}').style.display='none';this.classList.add('loaded');"
               onerror="document.getElementById('imgPlaceholder${idx}').innerHTML='<span>⚠️</span><span style=\\'font-size:11px\\'>图片加载失败</span>';">
          <div class="img-label">🎬 ${esc(img.sceneLabel || '场景')}</div>
        </div>
      `).join('')}
    </div>
  </div>`;
}

function parseScenes(txt) {
  const scenes = [];
  const regex = /\[场景\]\s*(.+)/g;
  let m;
  while ((m = regex.exec(txt)) !== null) scenes.push({ description: m[1].trim(), sceneLabel: m[1].trim().substr(0,30) });
  if (scenes.length === 0) txt.split(/\n\n+/).filter(p=>p.trim().length>20).forEach((p,i) => scenes.push({ description: p.trim().substr(0,200), sceneLabel: `场景${i+1}` }));
  const max = (getCurrentProject()?.steps?.episodeCount || 1) * 5;
  return scenes.slice(0, max);
}

async function generateAllKeyframes() {
  const script = getStepData('script');
  const scenes = parseScenes(script);
  if (!scenes.length) return showToast('未检测到场景');
  const ratio = STATE.orientation === 'portrait' ? '9:16' : '16:9';
  const images = [];
  const progress = document.getElementById('keyframeProgress');
  for (let i=0; i<scenes.length; i++) {
    const s = scenes[i];
    progress.innerHTML = `<div class="loading-pulse">生成关键帧 ${i+1}/${scenes.length}</div>`;
    try {
      const url = await generateImage(`短剧关键帧画面，${s.description}。高质量电影感。`, ratio);
      images.push({ url, sceneLabel: s.sceneLabel, description: s.description });
    } catch (e) {
      images.push({ url: '', sceneLabel: s.sceneLabel, error: e.message });
    }
    await new Promise(r => setTimeout(r, 800)); // 间隔避免限流
  }
  setStepData('keyframes', images);
  progress.innerHTML = '';
  renderAll();
}

// ========== 视频步骤 ==========
function renderVideoStep(container) {
  const kf = getStepData('keyframes');
  const imgs = Array.isArray(kf) ? kf : [];
  if (!imgs.length) { container.innerHTML = '<div class="empty-state">🎬 请先生成关键帧</div>'; return; }
  const p = getCurrentProject();
  if (!p.episodes?.length) buildEpisodesFromKeyframes(p, imgs);
  container.innerHTML = `<div class="card"><div class="card-header"><span class="card-title">🎬 视频生成</span>
    <button class="btn btn-secondary btn-sm" onclick="toggleVideoPanel()">片段管理</button></div>
    <p>共 <strong>${p.episodes?.length||0}</strong> 集，<strong>${p.episodes.reduce((a,b)=>a+b.fragments.length,0)}</strong> 个片段</p>
    <button class="btn btn-primary" onclick="startGenerateAllVideos()">🎬 开始生成全部视频</button>
    <div id="videoProgressSummary" style="margin-top:12px"></div></div>`;
}

function buildEpisodesFromKeyframes(proj, images) {
  const script = proj.steps?.script || '';
  const epMatches = script.match(/第(\d+)集[：:]\s*(.+)/g) || [];
  const epCount = Math.max(epMatches.length, proj.steps?.episodeCount || 1);
  const perEp = Math.ceil(images.length / epCount);
  const eps = [];
  for (let i=0; i<epCount; i++) {
    const imgs = images.slice(i*perEp, (i+1)*perEp);
    const existing = proj.episodes?.[i];
    const fragments = imgs.map((img, fi) => ({
      id: existing?.fragments?.[fi]?.id || genId(),
      sceneSummary: img.sceneLabel || `片段${fi+1}`,
      imageUrl: img.url,
      description: img.description,
      videoId: existing?.fragments?.[fi]?.videoId || '',
      videoUrl: existing?.fragments?.[fi]?.videoUrl || '',
      videoStatus: existing?.fragments?.[fi]?.videoStatus || 'idle',
      videoError: ''
    }));
    eps.push({ index: i+1, title: epMatches[i]?.replace(/第\d+集[：:]\s*/,'') || `第${i+1}集`, duration: proj.steps?.episodeDuration||4, fragments });
  }
  proj.episodes = eps;
  saveState();
}

async function startGenerateAllVideos() {
  const p = getCurrentProject();
  if (!p?.episodes) return showToast('无视频数据');
  STATE.videoPanelOpen = true; renderAll();
  STATE.activeAbortController = new AbortController();
  const signal = STATE.activeAbortController.signal;
  for (const ep of p.episodes) {
    for (const frag of ep.fragments) {
      if (signal.aborted) break;
      if (frag.videoStatus === 'done' && frag.videoUrl) continue;
      if (!frag.imageUrl) { frag.videoStatus='error'; frag.videoError='无图片'; saveState(); renderVideoPanel(); continue; }
      frag.videoStatus = 'generating'; saveState(); renderVideoPanel();
      try {
        const width = STATE.orientation === 'portrait' ? 736 : 1312;
        const height = STATE.orientation === 'portrait' ? 1312 : 736;
        const vid = await createVideoTask(`动态视频：${frag.description}`, frag.imageUrl, width, height);
        frag.videoId = vid; saveState(); renderVideoPanel();
        const url = await pollVideo(vid, (res) => {
          frag.videoStatus = res.status === 'completed' ? 'done' : 'generating';
          saveState(); renderVideoPanel();
        }, 5000, signal);
        frag.videoUrl = url; frag.videoStatus = 'done';
      } catch (e) {
        if (signal.aborted) break;
        frag.videoStatus = 'error'; frag.videoError = e.message;
      }
      saveState(); renderVideoPanel();
      await new Promise(r => setTimeout(r, 2000)); // 间隔2秒
    }
  }
  STATE.activeAbortController = null;
}

async function regenerateSingleFragment(epIdx, fragIdx) {
  const p = getCurrentProject();
  const frag = p?.episodes?.[epIdx]?.fragments?.[fragIdx];
  if (!frag) return;
  frag.videoStatus = 'generating'; frag.videoError = ''; frag.videoUrl = ''; frag.videoId = ''; saveState(); renderVideoPanel();
  try {
    const w = STATE.orientation==='portrait'?736:1312, h = STATE.orientation==='portrait'?1312:736;
    const vid = await createVideoTask(`动态视频：${frag.description}`, frag.imageUrl, w, h);
    frag.videoId = vid; saveState(); renderVideoPanel();
    const url = await pollVideo(vid, (res) => { frag.videoStatus = res.status==='completed'?'done':'generating'; saveState(); renderVideoPanel(); });
    frag.videoUrl = url; frag.videoStatus = 'done';
  } catch (e) { frag.videoStatus = 'error'; frag.videoError = e.message; }
  saveState(); renderVideoPanel();
}

function renderVideoPanel() {
  document.getElementById('videoPanel').classList.toggle('open', STATE.videoPanelOpen);
  if (!STATE.videoPanelOpen) return;
  const p = getCurrentProject();
  const body = document.getElementById('videoPanelBody');
  if (!p?.episodes?.length) { body.innerHTML = '<div class="empty-state">暂无片段</div>'; return; }
  body.innerHTML = `<div style="font-weight:700;color:var(--accent);margin-bottom:12px">📺 ${esc(p.name)}</div>
    ${p.episodes.map((ep,ei) => `
      <div class="fragment-episode"><div class="fragment-episode-title">📁 第${ep.index}集（${ep.duration}分钟）</div>
      ${ep.fragments.map((f,fi) => `
        <div class="fragment-item">
          <span class="fragment-index">🎞️${fi+1}</span><span class="fragment-summary">${esc(f.sceneSummary)}</span>
          <span class="fragment-status ${f.videoStatus}">${f.videoStatus==='done'?'✅':'⏳'} ${f.videoStatus==='done'?'完成':'生成中'}</span>
          <span class="fragment-actions">
            ${f.videoStatus==='done'&&f.videoUrl?`<button class="btn btn-xs btn-primary" onclick="playVideo('${esc(f.videoUrl)}')">▶</button>`:''}
            <button class="btn btn-xs btn-secondary" onclick="regenerateSingleFragment(${ei},${fi})">🔄</button>
          </span>
        </div>${f.videoStatus==='generating'?'<div class="progress-bar"><div class="progress-fill" style="width:60%;animation:progressPulse 1.5s infinite"></div></div>':''}
      `).join('')}</div>
    `).join('')}`;
}

function toggleVideoPanel() { STATE.videoPanelOpen = !STATE.videoPanelOpen; renderVideoPanel(); }

async function redoStep(key) {
  const p = getCurrentProject();
  const idx = STEPS.findIndex(s => s.key === key);
  for (let i=idx; i<STEPS.length; i++) delete p.steps[STEPS[i].key];
  if (key==='keyframes'||key==='video') p.episodes = [];
  saveState();
  STATE.currentStep = key;
  STATE.videoPanelOpen = (key==='video');
  renderAll();
  if (key==='plot') await startGeneratePlot();
  else if (key==='script') await generateScriptFromPlot();
}

function approveStep(next) {
  STATE.currentStep = next;
  if (next==='video') STATE.videoPanelOpen = true;
  renderAll();
}

init();
</script>
